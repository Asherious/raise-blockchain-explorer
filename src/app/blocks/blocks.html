<!-- Blocks -->
<div>
  <!-- Horizontal Scrollable Block List -->
  <div>
    <div
      class="z-10 relative w-full top-[55px] h-2 bg-[#e0e4e7] shadow-[inset_0px_3px_6px_#c8c8c8,inset_0px_-3px_6px_#ffffff] dark:bg-[#24272C] dark:shadow-[inset_0px_3px_6px_#0000004d,inset_0px_-3px_6px_#ffffff14]"
    ></div>
    <div
      #scrollContainer
      class="cursor-pointer active:cursor-pointer! relative py-4 flex w-full overflow-x-auto scrollbar-hide"
      (mousedown)="onMouseDown($event)"
    >
      <div *ngFor="let block of blockList" class="relative z-10">
        <a [routerLink]="['/blocks', block.number]" draggable="false">
          <div
            class="px-3 flex-row"
            (dragstart)="$event.preventDefault()"
            (click)="onBlockClick($event)"
          >
            <button
              class="relative cursor-pointer h-[70px] w-[70px] rounded-[10px] transition-transform duration-300 hover:scale-110 bg-[#e0e4e7] shadow-[3px_3px_6px_#c8c8c8,-3px_-3px_6px_#ffffff] dark:bg-[#24272C] dark:shadow-[3px_3px_6px_#0000004d,-3px_-3px_6px_#ffffff14]"
            >
              <!-- Track -->
              <div class="absolute inset-0 rounded-[10px] overflow-hidden">
                <!-- Tick marks (10 max tx) -->
                <div class="flex flex-col justify-between px-1 py-1 pointer-events-none">
                  <span *ngFor="let _ of ticks"></span>
                </div>

                <!-- Fill -->
                <div
                  class="absolute bottom-0 w-full bg-linear-to-br from-[#eb5d82] via-[#eb5d5d] to-[#ed2b2b]"
                  [style.height.%]="(block.txCount / 10) * 100"
                ></div>
              </div>
            </button>
            <p class="text-sm text-center font-regular text-gray-500 dark:text-[#7F8493]">
              #{{ block.number }}
            </p>
          </div>
        </a>
      </div>
    </div>
  </div>
  <div
    class="mx-6 mb-6 px-3 pt-2 pb-3 bg-[#e0e4e7] shadow-[3px_3px_6px_#c8c8c8,-3px_-3px_6px_#ffffff] dark:bg-[#24272C] dark:shadow-[3px_3px_6px_#0000004d,-3px_-3px_6px_#ffffff14] rounded-[25px]"
  >
    <!-- Header -->
    <div
      class="hidden mb-2 sm:grid grid-cols-[1fr_4fr_2fr_2fr_1fr] px-4 items-center text-base font-medium"
    >
      <span class="hidden sm:block">Block</span>
      <span class="hidden sm:block text-center">Data Hash</span>
      <span class="hidden sm:block text-center">Transactions</span>
      <span class="hidden sm:block text-center">Timestamp</span>
      <span class="hidden sm:block text-right">Size</span>
    </div>
    <div class="block sm:hidden mb-2 px-4 items-center text-base font-medium text-center">
      <span>Blocks</span>
    </div>
    <!-- Block List -->
    <div class="space-y-3">
      <a
        *ngFor="let block of paginatedBlockList"
        [routerLink]="['/blocks', block.number]"
        class="relative group block w-full rounded-[10px]"
      >
        <!-- Normal Shadow -->
        <span
          class="absolute inset-0 rounded-[10px] shadow-[3px_3px_6px_#c8c8c8,-3px_-3px_6px_#ffffff] dark:shadow-[3px_3px_6px_#0000004d,-3px_-3px_6px_#ffffff14] transition-opacity duration-300 ease-in-out group-hover:opacity-0"
        ></span>

        <!-- Inset Shadow -->
        <span
          class="absolute inset-0 rounded-[10px] shadow-[inset_3px_3px_6px_#c8c8c8,inset_-3px_-3px_6px_#ffffff] dark:shadow-[inset_3px_3px_6px_#0000004d,inset_-3px_-3px_6px_#ffffff14] transition-opacity duration-300 ease-in-out opacity-0 group-hover:opacity-100"
        ></span>
        <div
          class="relative z-10 sm:grid sm:grid-cols-[1fr_4fr_2fr_2fr_1fr] p-4 items-center text-sm transition-transform duration-300 ease-in-out group-hover:scale-[0.99]"
        >
          <p class="font-medium text-lg dark:text-[#7F8493] sm:ml-2">
            {{ block.number }}
          </p>

          <p
            class="text-gray-500 truncate max-w-200 text-center"
            style="
              font-family:
                Space Mono,
                monospace;
            "
          >
            {{ block.dataHash }}
          </p>

          <p class="text-gray-500 sm:text-center">
            {{ block.txCount }}
          </p>

          <p class="text-gray-500 sm:text-center">{{ block.timestamp | formatDate }}</p>

          <p class="text-gray-500 sm:text-right">{{ block.size }} kB</p>
        </div>
      </a>
    </div>
    <!-- Pagination -->
    <div class="flex justify-center items-center space-x-3 mt-3">
      <!-- Previous Page -->
      <button
        (click)="previousPage()"
        [disabled]="currentPage === 1"
        class="cursor-pointer relative p-2.5 rounded-full transition-all duration-300 ease-in-out group disabled:opacity-0"
      >
        <!-- Normal Shadow -->
        <span
          class="absolute inset-0 rounded-full shadow-[3px_3px_6px_#c8c8c8,-3px_-3px_6px_#ffffff] dark:shadow-[3px_3px_6px_#0000004d,-3px_-3px_6px_#ffffff14] transition-opacity duration-300 ease-in-out group-hover:opacity-0"
        ></span>
        <!-- Inset Shadow -->
        <span
          class="absolute inset-0 rounded-full shadow-[inset_3px_3px_6px_#c8c8c8,inset_-3px_-3px_6px_#ffffff] dark:shadow-[inset_3px_3px_6px_#0000004d,inset_-3px_-3px_6px_#ffffff14] transition-opacity duration-300 ease-in-out opacity-0 group-hover:opacity-100"
        ></span>
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2.5"
          stroke="currentColor"
          class="size-4 dark:text-[#7F8493] transition-transform duration-300 ease-in-out group-hover:scale-[0.9]"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"
          />
        </svg>
      </button>

      <!-- Numbered Pages -->
      <button
        *ngFor="let page of visiblePages"
        (click)="goToPage(page)"
        class="cursor-pointer relative size-9 rounded-full bg-[#e0e4e7] dark:bg-[#24272C] transition-all duration-300 ease-in-out group"
      >
        <!-- Normal Shadow -->
        <span
          class="absolute inset-0 rounded-full transition-opacity duration-300 ease-in-out"
          [ngClass]="
            currentPage === page
              ? 'opacity-0'
              : 'opacity-100 group-hover:opacity-0 shadow-[3px_3px_6px_#c8c8c8,-3px_-3px_6px_#ffffff] dark:shadow-[3px_3px_6px_#0000004d,-3px_-3px_6px_#ffffff14]'
          "
        ></span>

        <!-- Inset Shadow -->
        <span
          class="absolute inset-0 rounded-full transition-opacity duration-300 ease-in-out"
          [ngClass]="
            currentPage === page
              ? 'opacity-100 shadow-[inset_3px_3px_6px_#c8c8c8,inset_-3px_-3px_6px_#ffffff] dark:shadow-[inset_3px_3px_6px_#0000004d,inset_-3px_-3px_6px_#ffffff14]'
              : 'opacity-0 group-hover:opacity-100 shadow-[inset_3px_3px_6px_#c8c8c8,inset_-3px_-3px_6px_#ffffff] dark:shadow-[inset_3px_3px_6px_#0000004d,inset_-3px_-3px_6px_#ffffff14]'
          "
        ></span>

        <div class="transition-transform duration-300 ease-in-out group-hover:scale-[0.9]">
          <span class="text-sm dark:text-[#7F8493]">
            {{ page }}
          </span>
        </div>
      </button>

      <!-- Next Page -->
      <button
        (click)="nextPage()"
        [disabled]="currentPage === totalPages"
        class="cursor-pointer relative p-2.5 rounded-full transition-all duration-300 ease-in-out group disabled:opacity-0"
      >
        <!-- Normal Shadow -->
        <span
          class="absolute inset-0 rounded-full shadow-[3px_3px_6px_#c8c8c8,-3px_-3px_6px_#ffffff] dark:shadow-[3px_3px_6px_#0000004d,-3px_-3px_6px_#ffffff14] transition-opacity duration-300 ease-in-out group-hover:opacity-0"
        ></span>
        <!-- Inset Shadow -->
        <span
          class="absolute inset-0 rounded-full shadow-[inset_3px_3px_6px_#c8c8c8,inset_-3px_-3px_6px_#ffffff] dark:shadow-[inset_3px_3px_6px_#0000004d,inset_-3px_-3px_6px_#ffffff14] transition-opacity duration-300 ease-in-out opacity-0 group-hover:opacity-100"
        ></span>
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2.5"
          stroke="currentColor"
          class="size-4 dark:text-[#7F8493] transition-transform duration-300 ease-in-out group-hover:scale-[0.9]"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3"
          />
        </svg>
      </button>
    </div>
  </div>
</div>

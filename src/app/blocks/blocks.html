<!-- Blocks -->
<div>
  <div>
    <div
      class="z-10 relative w-screen top-[55px] h-2 bg-[#e0e4e7] shadow-[inset_0px_3px_6px_#c8c8c8,inset_0px_-3px_6px_#ffffff] dark:bg-[#24272C] dark:shadow-[inset_0px_3px_6px_rgba(0,0,0,0.3),inset_0px_-3px_6px_rgba(255,255,255,0.08)]"
    ></div>
    <div
      #scrollContainer
      class="cursor-pointer active:cursor-pointer! relative py-4 flex w-full overflow-x-auto scrollbar-hide"
      (mousedown)="onMouseDown($event)"
    >
      <div *ngFor="let block of blockList" class="relative z-10">
        <a [routerLink]="['/blocks', block.number]">
          <div class="px-3 flex-row">
            <button
              class="cursor-pointer h-[70px] w-[70px] transition-transform duration-200 hover:scale-110 bg-[#e0e4e7] shadow-[3px_3px_6px_#c8c8c8,-3px_-3px_6px_#ffffff] dark:bg-[#24272C] dark:shadow-[3px_3px_6px_rgba(0,0,0,0.3),-3px_-3px_6px_rgba(255,255,255,0.08)] rounded-[10px]"
            ></button>
            <p class="text-[14px] text-center font-regular text-gray-500 dark:text-[#7F8493]">
              #{{ block.number }}
            </p>
          </div>
        </a>
      </div>
    </div>
  </div>
  <div
    class="mx-12 mb-12 p-3 space-y-3 text-center bg-[#e0e4e7] shadow-[3px_3px_6px_#c8c8c8,-3px_-3px_6px_#ffffff] dark:bg-[#24272C] dark:shadow-[3px_3px_6px_rgba(0,0,0,0.3),-3px_-3px_6px_rgba(255,255,255,0.08)] rounded-[25px]"
  >
    <div class="grid grid-cols-5 mb-3 text-[16px] font-medium">
      <span>Block</span>
      <!--<span>Channel</span>-->
      <span>Txs</span>
      <span>Data Hash</span>
      <!--<span>Block Hash</span>-->
      <span>Previous Hash</span>
      <span>Size</span>
    </div>
    <div class="space-y-3">
      <div *ngFor="let block of paginatedBlockList">
        <a [routerLink]="['/blocks', block.number]" class="block w-full">
          <button
            class="cursor-pointer w-full bg-[#e0e4e7] shadow-[3px_3px_6px_#c8c8c8,-3px_-3px_6px_#ffffff] dark:bg-[#24272C] dark:shadow-[3px_3px_6px_rgba(0,0,0,0.3),-3px_-3px_6px_rgba(255,255,255,0.08)] rounded-[10px]"
          >
            <div class="grid grid-cols-5 py-4 text-[14px]">
              <p class="font-medium dark:text-[#7F8493]">{{ block.number }}</p>
              <!--<p class="text-gray-500">{{ block.channelName }}</p>-->
              <p class="text-gray-500">{{ block.txCount }}</p>
              <button
                class="cursor-pointer text-gray-500 hover:font-bold"
                (click)="copy(block.dataHash)"
              >
                {{ block.dataHash | truncateHash }}
              </button>
              <!--<p class="text-gray-500">{{ block.blockHash | truncateHash }}</p>-->
              <p class="text-gray-500">{{ block.previousHash | truncateHash }}</p>
              <p class="text-gray-500">{{ block.size }} kB</p>
            </div>
          </button>
        </a>
      </div>
    </div>
    <div class="flex justify-center items-center space-x-4">
      <button
        (click)="previousPage()"
        [disabled]="currentPage === 1"
        class="cursor-pointer px-2.5 py-2.5 text-[14px] font-medium transition-colors bg-[#e0e4e7] shadow-[3px_3px_6px_#c8c8c8,-3px_-3px_6px_#ffffff] dark:bg-[#24272C] dark:shadow-[3px_3px_6px_rgba(0,0,0,0.3),-3px_-3px_6px_rgba(255,255,255,0.08)] rounded-full dark:text-[#7F8493] disabled:opacity-0 disabled:cursor-default"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="size-3.5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"
          />
        </svg>
      </button>

      <span class="text-[14px] font-medium dark:text-[#7F8493]">
        Page {{ currentPage }} of {{ totalPages }}
      </span>

      <button
        (click)="nextPage()"
        [disabled]="currentPage === totalPages"
        class="cursor-pointer px-2.5 py-2.5 text-[14px] font-medium transition-colors bg-[#e0e4e7] shadow-[3px_3px_6px_#c8c8c8,-3px_-3px_6px_#ffffff] dark:bg-[#24272C] dark:shadow-[3px_3px_6px_rgba(0,0,0,0.3),-3px_-3px_6px_rgba(255,255,255,0.08)] rounded-full dark:text-[#7F8493] disabled:opacity-0 disabled:cursor-default"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="size-3.5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3"
          />
        </svg>
      </button>
    </div>
  </div>
</div>
